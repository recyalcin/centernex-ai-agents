<script>
        function loadWidget(widgetId) {
                const container = document.getElementById('scripter');

                // Eski scripti kaldır
                container.innerHTML = '';

                // Sayfaya eklenmiş iframe'leri de temizle
                document
                        .querySelectorAll('iframe[src*="leadconnectorhq"]')
                        .forEach(el => el.remove());

                // Yeni script oluştur
                const script = document.createElement('script');
                script.src = 'https://widgets.leadconnectorhq.com/loader.js';
                script.async = true;
                script.defer = true;

                script.dataset.resourcesUrl =
                        'https://widgets.leadconnectorhq.com/chat-widget/loader.js';
                script.dataset.widgetId = widgetId;

                container.appendChild(script);
        }

        const widgetMap = {
                technology: '',
                healthcare: '',
                realestate: '',
                restaurant: '',
                fashion: '',
                roofingde: '695d42a54bc92707246c1682',
                roofing: '695d06131dcd0b52090d5469',
                barbershop: '69384336e132d83cd7d7b3a8'
        };


        const demoButtons = document.querySelectorAll('button.demo');
        const demoImage = document.getElementById('demo_image');

        demoButtons.forEach(button => {
                button.addEventListener('click', (e) => {
                        // UI aktiflik
                        demoButtons.forEach(btn => {
                                btn.classList.remove('bg-background', 'text-foreground', 'shadow-sm');
                                btn.classList.add('text-muted-foreground');
                        });

                        e.target.classList.add('bg-background', 'text-foreground', 'shadow-sm');
                        e.target.classList.remove('text-muted-foreground');

                        // Görsel değiştir
                        const key = e.target.textContent.toLowerCase().replace(/\s+/g, '');
                        demoImage.src = `./showcase_files/${key}.png`;

                        // Widget değiştir
                        const widgetId = widgetMap[key];
                        if (widgetId) {
                                loadWidget(widgetId);
                        }
                });
        });


</script>
