<html lang="en" class="plt-desktop md" mode="md">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Industry Showcase Platform</title>
  <meta name="description" content="Explore landing pages across different industries" />

  <link rel="icon" href="assets/icon.png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="assets/icon.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="assets/icon.png" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.png">

  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.08);
      --panel-2: rgba(255,255,255,0.12);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --muted-2: #94a3b8;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 20px 60px rgba(0,0,0,0.28);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: white;
    }

    body {
      overflow: hidden;
    }

    .app-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(15, 23, 42, 0.86);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      width: 100%;
      padding: 10px 12px;
      overflow-x: auto;
    }

    .topbar-scroll {
      display: flex;
      justify-content: center;
    }

    .demo-tabs {
      display: inline-flex;
      min-width: max-content;
      gap: 6px;
      padding: 6px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .demo {
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      color: #94a3b8;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .demo:hover {
      color: #fff;
      transform: translateY(-1px);
    }

    .demo.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .showcase {
      height: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: center;
      background: #0f172a;
    }

    .demo-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .demo-page {
      min-height: 100%;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .demo-page-inner {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
      position: relative;
      z-index: 2;
    }

    .demo-navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }

    .brand {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.88);
      margin-bottom: 18px;
    }

    .hero-title {
      font-size: clamp(34px, 6vw, 68px);
      line-height: 0.98;
      letter-spacing: -0.05em;
      font-weight: 900;
      margin: 0 0 18px;
    }

    .hero-subtitle {
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
      max-width: 640px;
      margin: 0 0 26px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn-primary,
    .btn-secondary {
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: white;
      color: #0f172a;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
    }

    .hero-visual {
      min-height: 420px;
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .mock-window {
      position: absolute;
      inset: 0;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mock-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .mock-dots {
      display: flex;
      gap: 7px;
    }

    .mock-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }

    .mock-chip {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.86);
    }

    .mock-content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .panel {
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 16px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.88);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .panel-list {
      display: grid;
      gap: 10px;
    }

    .panel-line,
    .panel-block {
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
    }

    .panel-line {
      height: 12px;
    }

    .panel-block {
      height: 74px;
    }

    .feature-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .feature-pills span {
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.86);
    }

    #scripter {
      position: absolute;
      right: 22px;
      bottom: 22px;
      z-index: 20;
    }

    @media (max-width: 960px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }

      .hero-visual {
        min-height: 360px;
      }

      .mock-content {
        grid-template-columns: 1fr;
      }

      #scripter {
        right: 14px;
        bottom: 14px;
      }
    }

    @media (max-width: 640px) {
      .demo-page-inner {
        width: min(100%, calc(100% - 20px));
        padding-top: 16px;
      }

      .demo-navbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        justify-content: flex-start;
        gap: 12px;
      }

      .stats-row {
        grid-template-columns: 1fr;
      }

      .hero-visual {
        min-height: 320px;
        border-radius: 22px;
      }

      .hero-title {
        line-height: 1.02;
      }
    }
  </style>
</head>

    function renderDemo(key) {
      demoStage.innerHTML = demoTemplates[key] || demoTemplates.craftprodepot;
    }

    demoButtons.forEach(button => {
      button.addEventListener('click', (e) => {
        const key = e.currentTarget.dataset.key;

        demoButtons.forEach(btn => btn.classList.remove('active'));
        e.currentTarget.classList.add('active');

        renderDemo(key);

        const widgetId = widgetMap[key];
        if (widgetId) {
          loadWidget(widgetId);
        }
      });
    });

    renderDemo('craftprodepot');
